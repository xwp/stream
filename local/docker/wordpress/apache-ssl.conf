# SSL vhost for the local Stream development environment.
#
# Mirrors the default HTTP vhost (DocumentRoot + WordPress index) but adds
# TLS termination on :443 using a mkcert-generated cert mounted at
# /etc/ssl/certs/stream-local. Required for testing WordPress Application
# Passwords (which require a secure connection) and the WordPress MCP
# Adapter integration (whose authentication flows assume HTTPS).
<VirtualHost _default_:443>
	DocumentRoot /var/www/html

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	SSLEngine on
	SSLCertificateFile	/etc/ssl/certs/stream-local/cert.pem
	SSLCertificateKeyFile /etc/ssl/certs/stream-local/key.pem

	<FilesMatch "\.(?:cgi|shtml|phtml|php)$">
		SSLOptions +StdEnvVars
	</FilesMatch>
	<Directory /usr/lib/cgi-bin>
		SSLOptions +StdEnvVars
	</Directory>

	<Directory /var/www/html>
		AllowOverride All
		Require all granted
	</Directory>
</VirtualHost>
